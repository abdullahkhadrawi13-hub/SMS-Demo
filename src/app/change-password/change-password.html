<div class="login-container">
  <form class="login-form">
    <h2>Change Password</h2>

    <label for="CurrentPassword">Current Password :</label>
    <input id="CurrentPassword" type="text" #CurrentPassword />

    <label for="NewPassword">New Password :</label>
    <input id="NewPassword" type="text" #NewPassword />

    <label for="ConfirmPassword">Confirm Password :</label>
    <input id="ConfirmPassword" type="text" #ConfirmPassword />
    
    @if (errorMessage) {<p class="error">{{ errorMessage }}</p>}

    <div class="buttons">
      <button
        class="login-btn"
        type="button"
        (click)="changePassword(CurrentPassword.value, NewPassword.value, ConfirmPassword.value)"
      >
        Change
      </button>
    </div>
  </form>
</div>
