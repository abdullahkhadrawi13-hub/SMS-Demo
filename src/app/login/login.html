<div class="login-container">
  <form class="login-form">
    <h2>Login</h2>

    <label for="username">Username :</label>
    <input id="username" type="text" #username />

    <label for="password">Password :</label>
    <div class="password-container">
      <input id="password" [type]="showPassword ? 'text' : 'password'" #password />
      <button type="button" (click)="togglePassword()">👁️‍🗨️</button>
    </div>
    @if (errorMessage()) {
  <p class="error-message">
    {{ errorMessage() }}
  </p>
}

    <div class="buttons">
      <button class="login-btn" type="button" (click)="login(username.value, password.value)">
        Log In
      </button>
    </div>
  </form>
</div>
